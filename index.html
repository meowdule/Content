<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="AX 리소스 허브" />
    <title>AX 리소스 허브</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true"></div>

    <div class="layout-wrap">
      <header class="site-header layout">
        <div class="brand-row" style="grid-column: 1 / -1">
          <div class="brand">
            <div class="logo" aria-hidden="true">⚡</div>
            <div>
              <h1 class="brand-title">AX 리소스 허브</h1>
            </div>
          </div>
          <div class="header-actions">
            <button
              type="button"
              class="btn btn--ghost"
              id="theme-toggle"
              aria-label="테마 전환"
            >
              테마
            </button>
          </div>
        </div>

        <div class="hero-card layout" style="grid-column: 1 / -1">
          <div class="hero-badges">
            <span class="badge badge--accent">해외 참고 링크</span>
            <span class="badge badge--violet">게시글 초안</span>
          </div>
          <div
            role="tablist"
            aria-label="탭 선택"
            class="space-tabs"
          >
            <button
              type="button"
              role="tab"
              id="tab-overseas"
              aria-selected="true"
              class="space-tab"
            >
              해외 참고 링크
            </button>
            <button
              type="button"
              role="tab"
              id="tab-community"
              aria-selected="false"
              class="space-tab"
            >
              게시글 초안
            </button>
          </div>

          <div class="sidebar-mobile">
            <select class="cat-select" id="nav-mobile" aria-label="카테고리로 이동">
              <option value="">모바일: 카테고리로 이동…</option>
            </select>
          </div>

          <div class="search-bar">
            <label class="visually-hidden" for="search">리소스 검색</label>
            <div class="input-wrap">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
              <input
                type="search"
                id="search"
                autocomplete="off"
                placeholder="제목·설명 검색…"
                enterkeyhint="search"
              />
            </div>
          </div>
          <div class="period-filter-wrap">
            <span class="period-label" id="period-label">기간</span>
            <div
              class="period-filter"
              id="period-filter"
              role="group"
              aria-labelledby="period-label"
            >
              <button type="button" class="period-chip" data-period-days="7">
                1주
              </button>
              <button
                type="button"
                class="period-chip period-chip--active"
                data-period-days="30"
              >
                1달
              </button>
              <button type="button" class="period-chip" data-period-days="90">
                3달
              </button>
              <button type="button" class="period-chip" data-period-days="182">
                반년
              </button>
              <button type="button" class="period-chip" data-period-days="365">
                1년
              </button>
            </div>
          </div>
          <p class="search-meta" id="search-count" aria-live="polite"></p>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar sidebar-desktop" aria-label="카테고리 내비게이션">
          <div class="sidebar-inner">
            <p class="sidebar-title">Jump to</p>
            <ul class="nav-list" id="nav-desktop"></ul>
          </div>
        </aside>

        <main class="main" id="main">
          <div class="expand-toolbar">
            <button
              type="button"
              class="btn btn-register-tab"
              id="btn-register-tab"
              aria-label="현재 탭에 링크 등록"
            >
              등록
            </button>
            <button type="button" class="btn btn--ghost" id="expand-all">
              모두 펼치기
            </button>
            <button type="button" class="btn btn--ghost" id="collapse-all">
              모두 접기
            </button>
          </div>

          <div id="catalog"></div>
        </main>
      </div>
    </div>

    <div id="toast-mini" class="toast-mini" hidden role="status"></div>

    <div id="dlg-register" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-modal-backdrop aria-hidden="true"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="dlg-reg-title">
        <header class="modal-head">
          <h2 class="modal-title" id="dlg-reg-title">게시글·링크 등록</h2>
          <button type="button" class="btn-icon-x" data-modal-close aria-label="닫기">×</button>
        </header>
        <div class="modal-body">
          <p id="reg-api-hint" class="reg-api-hint" role="status"></p>
          <form id="form-register" class="stack-form">
            <fieldset class="fieldset-row">
              <legend class="fieldset-legend">넣을 탭</legend>
              <label class="choice"
                ><input type="radio" name="space" id="reg-space-overseas" checked /> 해외 참고 링크</label
              >
              <label class="choice"
                ><input type="radio" name="space" id="reg-space-community" /> 게시글 초안</label
              >
            </fieldset>
            <label class="lbl">카테고리
              <select id="reg-category" name="category" required class="fld"></select>
            </label>
            <label class="lbl">제목
              <input id="reg-title" name="title" type="text" required class="fld" maxlength="280" autocomplete="off" data-modal-initial-focus />
            </label>
            <label class="lbl">설명 (선택)
              <textarea id="reg-desc" name="desc" class="fld fld-ta" rows="2"></textarea>
            </label>
            <label class="lbl">URL
              <input id="reg-url" name="url" type="url" required class="fld" placeholder="https:// …" autocomplete="off" />
            </label>
            <footer class="modal-actions">
              <button type="button" class="btn btn--ghost" data-modal-close>취소</button>
              <button type="submit" class="btn btn-submit">등록 / 저장</button>
            </footer>
          </form>
        </div>
      </div>
    </div>

    <div id="dlg-edit" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-modal-backdrop aria-hidden="true"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="dlg-edit-title">
        <header class="modal-head">
          <h2 class="modal-title" id="dlg-edit-title">등록글 수정</h2>
          <button type="button" class="btn-icon-x" data-modal-close aria-label="닫기">×</button>
        </header>
        <div class="modal-body">
          <form id="form-edit" class="stack-form">
            <input type="hidden" id="edit-id" />
            <label class="lbl">카테고리
              <select id="edit-category" class="fld"></select>
            </label>
            <label class="lbl">제목
              <input id="edit-title" type="text" required class="fld" maxlength="280" autocomplete="off" data-modal-initial-focus />
            </label>
            <label class="lbl">설명
              <textarea id="edit-desc" class="fld fld-ta" rows="2"></textarea>
            </label>
            <label class="lbl">URL
              <input id="edit-url" type="url" required class="fld" placeholder="https://" />
            </label>
            <label class="lbl">관리 비밀번호 <span class="req-star">*</span>
              <input id="edit-password" type="password" class="fld" autocomplete="current-password" required />
            </label>
            <footer class="modal-actions">
              <button type="button" class="btn btn--ghost" data-modal-close>취소</button>
              <button type="submit" class="btn btn-submit">수정 적용</button>
            </footer>
          </form>
        </div>
      </div>
    </div>

    <div id="dlg-delete" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-modal-backdrop aria-hidden="true"></div>
      <div class="modal-panel" role="dialog" aria-modal="true">
        <header class="modal-head">
          <h2 class="modal-title">등록글 삭제</h2>
          <button type="button" class="btn-icon-x" data-modal-close aria-label="닫기">×</button>
        </header>
        <div class="modal-body">
          <form id="form-delete" class="stack-form">
            <input type="hidden" id="delete-id" />
            <p class="delete-warn">이 항목은 목록에서 삭제됩니다.</p>
            <label class="lbl">관리 비밀번호
              <input id="delete-password" type="password" class="fld" autocomplete="current-password" required data-modal-initial-focus />
            </label>
            <footer class="modal-actions">
              <button type="button" class="btn btn--ghost" data-modal-close>취소</button>
              <button type="submit" class="btn btn-mini--danger-flat">삭제</button>
            </footer>
          </form>
        </div>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
