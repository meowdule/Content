<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="AX 리소스 허브" />
    <!-- API가 정적 사이트와 다른 주소일 때만: <meta name="ax-api-base" content="https://API서버루트" /> -->
    <title>AX 리소스 허브</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true"></div>

    <div class="layout-wrap">
      <header class="site-header">
        <div class="site-header-bar">
          <div class="brand">
            <div class="logo" aria-hidden="true">⚡</div>
            <div>
              <h1 class="brand-title">AX 리소스 허브</h1>
              <p class="brand-tagline">해외 링크 · 게시글 초안 한곳에서</p>
            </div>
          </div>
          <div class="header-actions">
            <button
              type="button"
              class="btn btn--ghost"
              id="theme-toggle"
              aria-label="테마 전환"
            >
              테마
            </button>
          </div>
        </div>

        <div class="control-deck" aria-label="탭·검색·기간">
          <div class="control-deck__tabs">
            <div role="tablist" aria-label="탭 선택" class="space-tabs">
              <button
                type="button"
                role="tab"
                id="tab-overseas"
                aria-selected="true"
                class="space-tab"
              >
                해외 참고 링크
              </button>
              <button
                type="button"
                role="tab"
                id="tab-community"
                aria-selected="false"
                class="space-tab"
              >
                게시글 초안
              </button>
            </div>
            <div class="sidebar-mobile">
              <select class="cat-select" id="nav-mobile" aria-label="카테고리로 이동">
                <option value="">카테고리로 이동…</option>
              </select>
            </div>
          </div>

          <div class="control-deck__filters">
            <div class="filter-panel">
              <div class="filter-panel__head">
                <span class="filter-panel__title" id="search-region-label">검색</span>
              </div>
              <div class="filter-panel__body" aria-labelledby="search-region-label">
                <div class="search-bar">
                  <label class="visually-hidden" for="search">리소스 검색</label>
                  <div class="input-wrap">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      aria-hidden="true"
                    >
                      <circle cx="11" cy="11" r="8" />
                      <path d="m21 21-4.3-4.3" />
                    </svg>
                    <input
                      type="search"
                      id="search"
                      autocomplete="off"
                      placeholder="제목·설명 검색…"
                      enterkeyhint="search"
                    />
                  </div>
                </div>
                <p class="search-meta" id="search-count" aria-live="polite"></p>
              </div>
            </div>

            <div class="filter-panel filter-panel--period" aria-label="기간 필터">
              <div class="filter-panel__head">
                <span class="filter-panel__title" id="period-region-label">기간</span>
              </div>
              <div class="filter-panel__body">
                <div class="period-range-line">
                  <label class="range-date-field">
                    <span class="range-date-label">시작</span>
                    <input
                      type="date"
                      id="range-start"
                      class="fld fld-date fld-date--compact"
                      autocomplete="off"
                    />
                  </label>
                  <span class="range-date-sep" aria-hidden="true">~</span>
                  <label class="range-date-field">
                    <span class="range-date-label">종료</span>
                    <input
                      type="date"
                      id="range-end"
                      class="fld fld-date fld-date--compact"
                      autocomplete="off"
                    />
                  </label>
                </div>
                <div
                  class="period-filter period-filter--deck"
                  id="period-filter"
                  role="group"
                  aria-labelledby="period-region-label"
                >
                  <button type="button" class="period-chip" data-period-days="7">
                    1주
                  </button>
                  <button type="button" class="period-chip period-chip--active" data-period-days="30">
                    1달
                  </button>
                  <button type="button" class="period-chip" data-period-days="90">
                    3달
                  </button>
                  <button type="button" class="period-chip" data-period-days="182">
                    반년
                  </button>
                  <button type="button" class="period-chip" data-period-days="365">
                    1년
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar sidebar-desktop" aria-label="카테고리 내비게이션">
          <div class="sidebar-inner">
            <p class="sidebar-title">목차</p>
            <ul class="nav-list" id="nav-desktop"></ul>
          </div>
        </aside>

        <main class="main" id="main">
          <div class="main-toolbar">
            <div class="main-toolbar__start">
              <button
                type="button"
                class="btn btn-register-tab"
                id="btn-register-tab"
                aria-label="현재 탭에 등록"
              >
                등록
              </button>
            </div>
            <div class="main-toolbar__end">
              <button type="button" class="btn btn--ghost btn--toolbar" id="btn-manage-categories" aria-label="카테고리 편집">
                카테고리
              </button>
              <button type="button" class="btn btn--ghost btn--toolbar" id="expand-all">
                모두 펼치기
              </button>
              <button type="button" class="btn btn--ghost btn--toolbar" id="collapse-all">
                모두 접기
              </button>
            </div>
          </div>

          <div id="catalog"></div>
        </main>
      </div>
    </div>

    <div id="toast-mini" class="toast-mini" hidden role="status"></div>

    <div id="dlg-register" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-modal-backdrop aria-hidden="true"></div>
      <div class="modal-panel modal-panel--register" role="dialog" aria-modal="true" aria-labelledby="dlg-reg-title">
        <header class="modal-head modal-head--accent">
          <h2 class="modal-title" id="dlg-reg-title">링크 등록</h2>
          <button type="button" class="btn-icon-x" data-modal-close aria-label="닫기">×</button>
        </header>
        <div class="modal-body">
          <p id="reg-api-hint" class="reg-api-hint" role="status"></p>
          <form id="form-register" class="stack-form stack-form--register">
            <div class="form-section">
              <p class="form-section-title">탭</p>
              <div class="pill-row" role="group" aria-label="등록 탭">
                <label class="pill pill--toggle">
                  <input type="radio" name="space" id="reg-space-overseas" checked />
                  <span>해외 참고 링크</span>
                </label>
                <label class="pill pill--toggle">
                  <input type="radio" name="space" id="reg-space-community" />
                  <span>게시글 초안</span>
                </label>
              </div>
            </div>
            <div class="form-section">
              <label class="lbl lbl-tight" for="reg-category">카테고리</label>
              <select id="reg-category" name="category" required class="fld fld-select"></select>
            </div>
            <div class="form-section">
              <label class="lbl lbl-tight" for="reg-title">제목</label>
              <input id="reg-title" name="title" type="text" required class="fld" maxlength="280" autocomplete="off" data-modal-initial-focus />
            </div>
            <div class="form-section" id="reg-block-desc">
              <label class="lbl lbl-tight" for="reg-desc">한 줄 요약 <span class="lbl-optional">선택</span></label>
              <textarea id="reg-desc" name="desc" class="fld fld-ta" rows="2" placeholder="목록에 보이는 짧은 설명"></textarea>
            </div>
            <div class="form-section" id="reg-block-overseas">
              <label class="lbl lbl-tight" for="reg-url">URL <span class="req-star">*</span></label>
              <input id="reg-url" name="url" type="url" required class="fld" placeholder="https://…" autocomplete="off" />
            </div>
            <div class="form-section" id="reg-block-community" hidden>
              <label class="lbl lbl-tight" for="reg-body-md">본문 <span class="req-star">*</span> <span class="lbl-hint">Markdown · 굵게, 목록, 코드 블록</span></label>
              <textarea id="reg-body-md" name="bodyMd" class="fld fld-ta fld-mono" rows="12" placeholder="# 제목&#10;- 항목&#10;&#10;**굵게** 내용…"></textarea>
              <label class="lbl lbl-tight" for="reg-url-optional">참고 URL <span class="lbl-optional">선택</span></label>
              <input id="reg-url-optional" type="url" class="fld" placeholder="https://… (없어도 됨)" autocomplete="off" />
            </div>
            <footer class="modal-actions">
              <button type="button" class="btn btn--ghost" data-modal-close>취소</button>
              <button type="submit" class="btn btn-submit">등록</button>
            </footer>
          </form>
        </div>
      </div>
    </div>

    <div id="dlg-edit" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-modal-backdrop aria-hidden="true"></div>
      <div class="modal-panel modal-panel--register" role="dialog" aria-modal="true" aria-labelledby="dlg-edit-title">
        <header class="modal-head modal-head--accent">
          <h2 class="modal-title" id="dlg-edit-title">등록글 수정</h2>
          <button type="button" class="btn-icon-x" data-modal-close aria-label="닫기">×</button>
        </header>
        <div class="modal-body">
          <form id="form-edit" class="stack-form stack-form--register">
            <input type="hidden" id="edit-id" />
            <div class="form-section">
              <label class="lbl lbl-tight" for="edit-category">카테고리 <span class="lbl-hint">다른 분류로 옮길 수 있습니다</span></label>
              <select id="edit-category" class="fld fld-select" required></select>
            </div>
            <div class="form-section">
              <label class="lbl lbl-tight" for="edit-title">제목</label>
              <input id="edit-title" type="text" required class="fld" maxlength="280" autocomplete="off" data-modal-initial-focus />
            </div>
            <div class="form-section">
              <label class="lbl lbl-tight" for="edit-desc">한 줄 요약</label>
              <textarea id="edit-desc" class="fld fld-ta" rows="2"></textarea>
            </div>
            <div class="form-section" id="edit-block-body" hidden>
              <label class="lbl lbl-tight" for="edit-body-md">본문 (Markdown)</label>
              <textarea id="edit-body-md" class="fld fld-ta fld-mono" rows="12"></textarea>
            </div>
            <div class="form-section" id="edit-block-url">
              <label class="lbl lbl-tight" for="edit-url">URL</label>
              <input id="edit-url" type="url" class="fld" placeholder="https://" />
            </div>
            <div class="form-section form-section--auth">
              <label class="lbl lbl-tight" for="edit-password">공용 비밀번호 <span class="req-star">*</span> <span class="lbl-hint">팀 공유 (서버와 동일)</span></label>
              <input id="edit-password" type="password" class="fld" autocomplete="off" required placeholder="예: Tbell" />
            </div>
            <footer class="modal-actions">
              <button type="button" class="btn btn--ghost" data-modal-close>취소</button>
              <button type="submit" class="btn btn-submit">저장</button>
            </footer>
          </form>
        </div>
      </div>
    </div>

    <div id="dlg-delete" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-modal-backdrop aria-hidden="true"></div>
      <div class="modal-panel" role="dialog" aria-modal="true">
        <header class="modal-head">
          <h2 class="modal-title">등록글 삭제</h2>
          <button type="button" class="btn-icon-x" data-modal-close aria-label="닫기">×</button>
        </header>
        <div class="modal-body">
          <form id="form-delete" class="stack-form form-delete">
            <input type="hidden" id="delete-id" />
            <p class="delete-warn">이 항목은 목록에서 삭제됩니다. 공용 비밀번호를 입력하세요.</p>
            <div class="form-section form-section--auth">
              <label class="lbl lbl-tight" for="delete-password">공용 비밀번호 <span class="req-star">*</span></label>
              <input id="delete-password" type="password" class="fld" autocomplete="off" required placeholder="예: Tbell" data-modal-initial-focus />
            </div>
            <footer class="modal-actions">
              <button type="button" class="btn btn--ghost" data-modal-close>취소</button>
              <button type="submit" class="btn btn-mini--danger-flat">삭제</button>
            </footer>
          </form>
        </div>
      </div>
    </div>

    <div id="dlg-cat-edit" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-modal-backdrop aria-hidden="true"></div>
      <div class="modal-panel modal-panel--register" role="dialog" aria-modal="true" aria-labelledby="dlg-cat-title">
        <header class="modal-head modal-head--accent">
          <h2 class="modal-title" id="dlg-cat-title">카테고리 수정</h2>
          <button type="button" class="btn-icon-x" data-modal-close aria-label="닫기">×</button>
        </header>
        <div class="modal-body">
          <form id="form-cat-edit" class="stack-form stack-form--register">
            <div class="form-section">
              <label class="lbl lbl-tight" for="cat-edit-id">ID</label>
              <input id="cat-edit-id" type="text" class="fld" readonly />
            </div>
            <div class="form-section">
              <label class="lbl lbl-tight" for="cat-edit-emoji">이모지</label>
              <input id="cat-edit-emoji" type="text" class="fld" maxlength="8" autocomplete="off" />
            </div>
            <div class="form-section">
              <label class="lbl lbl-tight" for="cat-edit-title">제목</label>
              <input id="cat-edit-title" type="text" class="fld" required maxlength="160" autocomplete="off" />
            </div>
            <div class="form-section">
              <label class="lbl lbl-tight" for="cat-edit-subtitle">부제 / 설명</label>
              <input id="cat-edit-subtitle" type="text" class="fld" maxlength="400" autocomplete="off" />
            </div>
            <div class="form-section form-section--auth">
              <label class="lbl lbl-tight" for="cat-edit-pw">공용 비밀번호 <span class="req-star">*</span> <span class="lbl-hint">팀 공유</span></label>
              <input id="cat-edit-pw" type="password" class="fld" autocomplete="off" required placeholder="예: Tbell" data-modal-initial-focus />
            </div>
            <footer class="modal-actions">
              <button type="button" class="btn btn--ghost" data-modal-close>취소</button>
              <button type="submit" class="btn btn-submit">저장</button>
            </footer>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
  </body>
</html>
